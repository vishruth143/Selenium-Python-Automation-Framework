# .github/workflows/ci.yml
name: CI Tests

# Triggers: on push to relevant paths/branches, pull requests to main, and daily schedule
on:
  push:
    paths:
      - '.github/**'
      - 'config/**'
      - 'framework/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
    branches:
      - '**'

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '30 3 * * *'  # Runs at 09:00 AM IST every day

# Lint job: checks code quality using pylint and enforces a perfect score
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3 # Fetches code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.3' # Uses Python 3.13.3

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run Pylint on tests and Enforce 10/10 Score
        run: |
          echo "Linting tests directory..."
          SCORE=$(pylint tests | tee pylint-output.txt | tail -n 2 | grep "rated at" | awk '{print $7}' | cut -d'/' -f1)
          echo "Pylint Score: $SCORE"
          if [ "$(echo "$SCORE < 10.0" | bc)" -eq 1 ]; then
            echo "❌ Pylint score is less than 10.0. Failing the build."
            exit 1
          fi

  # Build and test job: runs after lint, executes tests, generates reports
  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      total:             ${{ steps.test_results.outputs.total }}
      passed:            ${{ steps.test_results.outputs.passed }}
      failed:            ${{ steps.test_results.outputs.failed }}
      skipped:           ${{ steps.test_results.outputs.skipped }}
      failed_ui:         ${{ steps.test_results.outputs.failed_ui }}
      failed_api:        ${{ steps.test_results.outputs.failed_api }}
      failed_mobile:     ${{ steps.test_results.outputs.failed_mobile }}
      failed_performance: ${{ steps.test_results.outputs.failed_performance }}
      failed_data:       ${{ steps.test_results.outputs.failed_data }}

    env:
      REGION: qa
      BROWSER: CHROME
      HEADLESS: Y

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7' # Uses Python 3.13.7

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Ensure output directories exist
        run: |
          mkdir -p output/allure-results
          mkdir -p output/screenshots
          mkdir -p output/logs
          mkdir -p output/reports
          mkdir -p output/videos

      - name: Run Pytest with HTML and Allure Reporting
        run: |
          pytest -vvv -m "pta or heroku or jsonplaceholder" \
            -n 4 \
            --html=output/reports/pta_report.html \
            --self-contained-html \
            --capture=tee-sys \
            --alluredir=output/allure-results \
            --durations=10 \
            --junit-xml=output/reports/junit_report.xml \
            tests

      - name: Parse Test Results
        if: always()
        id: test_results
        run: |
          python3 - <<'PYEOF'
          import os, xml.etree.ElementTree as ET
          from collections import defaultdict

          xml_path = 'output/reports/junit_report.xml'
          gho = os.environ.get('GITHUB_OUTPUT', '')

          def write(key, value):
              if gho:
                  with open(gho, 'a') as f:
                      f.write(f"{key}={value}\n")
              print(f"{key}={value}")

          # Layer detection: map classname/file path segment → friendly label
          LAYER_ORDER = ['ui', 'api', 'mobile', 'performance', 'data']
          LAYER_LABELS = {
              'ui':          '🖥️ UI',
              'api':         '🔌 API',
              'mobile':      '📱 Mobile',
              'performance': '⚡ Performance',
              'data':        '🗄️ Data',
          }

          if not os.path.isfile(xml_path):
              for k in ('total','passed','failed','skipped'):
                  write(k, '0')
              for layer in LAYER_ORDER:
                  write(f'failed_{layer}', 'None')
              raise SystemExit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          suites = root.findall('.//testsuite') or ([root] if root.tag == 'testsuite' else [])

          total = passed = failed = skipped = 0
          failed_by_layer = defaultdict(list)

          for suite in suites:
              total   += int(suite.get('tests',    0))
              failed  += int(suite.get('failures', 0)) + int(suite.get('errors', 0))
              skipped += int(suite.get('skipped',  0))

          passed = total - failed - skipped

          # Collect individual failed test names grouped by layer
          for tc in root.iter('testcase'):
              if tc.find('failure') is not None or tc.find('error') is not None:
                  classname = tc.get('classname', '')
                  name      = tc.get('name', 'unknown')
                  # Determine layer from classname (e.g. "tests.ui.heroku.test_heroku")
                  layer_found = 'ui'  # default
                  for layer in LAYER_ORDER:
                      if f'.{layer}.' in classname or classname.startswith(f'{layer}.') or classname.startswith(f'tests.{layer}.'):
                          layer_found = layer
                          break
                  failed_by_layer[layer_found].append(name)

          write('total',   str(total))
          write('passed',  str(passed))
          write('failed',  str(failed))
          write('skipped', str(skipped))

          for layer in LAYER_ORDER:
              names = failed_by_layer.get(layer, [])
              write(f'failed_{layer}', ', '.join(names) if names else 'None')

          print(f"Results → Total:{total} Passed:{passed} Failed:{failed} Skipped:{skipped}")
          PYEOF

      - name: Install Allure CLI (Manual)
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure Report HTML
        run: |
          allure generate output/allure-results --clean -o allure-report

      - name: Upload Allure HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload HTML Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: output/reports

      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: output/logs

      - name: Upload Screenshots as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots

      - name: Upload Videos as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: output/videos

  # Notification job: sends CI status to Microsoft Teams via webhook (Adaptive Card)
  notify-teams:
    name: Notify Teams
    needs: [ lint, build-and-test ]
    runs-on: ubuntu-latest
    if: always()  # Always run this job

    steps:
      - name: Send Notification to Microsoft Teams
        run: |
          LINT_STATUS="${{ needs.lint.result }}"
          BUILD_STATUS="${{ needs.build-and-test.result }}"

          # ── Overall result ──────────────────────────────────────────────────────
          if [ "$LINT_STATUS" = "success" ] && [ "$BUILD_STATUS" = "success" ]; then
            OVERALL="✅ All Tests Passed"
          else
            OVERALL="❌ Some Tests Failed"
          fi

          # ── Test stats ──────────────────────────────────────────────────────────
          TOTAL="${{ needs.build-and-test.outputs.total }}"
          PASSED="${{ needs.build-and-test.outputs.passed }}"
          FAILED="${{ needs.build-and-test.outputs.failed }}"
          SKIPPED="${{ needs.build-and-test.outputs.skipped }}"

          FAILED_UI="${{ needs.build-and-test.outputs.failed_ui }}"
          FAILED_API="${{ needs.build-and-test.outputs.failed_api }}"
          FAILED_MOBILE="${{ needs.build-and-test.outputs.failed_mobile }}"
          FAILED_PERFORMANCE="${{ needs.build-and-test.outputs.failed_performance }}"
          FAILED_DATA="${{ needs.build-and-test.outputs.failed_data }}"

          # ── Per-layer failure blocks (only rendered when failures exist) ────────
          UI_FAILURES_BLOCK=""
          if [ -n "$FAILED_UI" ] && [ "$FAILED_UI" != "None" ]; then
            UI_LIST=$(echo "$FAILED_UI" | sed 's/, /\n/g')
            UI_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 🖥️ UI Failures\",\"weight\":\"Bolder\",\"spacing\":\"Small\"},{\"type\":\"TextBlock\",\"text\":\"${UI_LIST}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          API_FAILURES_BLOCK=""
          if [ -n "$FAILED_API" ] && [ "$FAILED_API" != "None" ]; then
            API_LIST=$(echo "$FAILED_API" | sed 's/, /\n/g')
            API_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 🔌 API Failures\",\"weight\":\"Bolder\",\"spacing\":\"Small\"},{\"type\":\"TextBlock\",\"text\":\"${API_LIST}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          MOBILE_FAILURES_BLOCK=""
          if [ -n "$FAILED_MOBILE" ] && [ "$FAILED_MOBILE" != "None" ]; then
            MOBILE_LIST=$(echo "$FAILED_MOBILE" | sed 's/, /\n/g')
            MOBILE_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 📱 Mobile Failures\",\"weight\":\"Bolder\",\"spacing\":\"Small\"},{\"type\":\"TextBlock\",\"text\":\"${MOBILE_LIST}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          PERF_FAILURES_BLOCK=""
          if [ -n "$FAILED_PERFORMANCE" ] && [ "$FAILED_PERFORMANCE" != "None" ]; then
            PERF_LIST=$(echo "$FAILED_PERFORMANCE" | sed 's/, /\n/g')
            PERF_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ ⚡ Performance Failures\",\"weight\":\"Bolder\",\"spacing\":\"Small\"},{\"type\":\"TextBlock\",\"text\":\"${PERF_LIST}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          DATA_FAILURES_BLOCK=""
          if [ -n "$FAILED_DATA" ] && [ "$FAILED_DATA" != "None" ]; then
            DATA_LIST=$(echo "$FAILED_DATA" | sed 's/, /\n/g')
            DATA_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 🗄️ Data Failures\",\"weight\":\"Bolder\",\"spacing\":\"Small\"},{\"type\":\"TextBlock\",\"text\":\"${DATA_LIST}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Large",
                      "weight": "Bolder",
                      "text": "Selenium CI Pipeline — ${OVERALL}"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Repository",      "value": "${{ github.repository }}" },
                        { "title": "Branch",           "value": "${{ github.ref_name }}" },
                        { "title": "Trigger",          "value": "${{ github.event_name }}" },
                        { "title": "Triggered by",     "value": "${{ github.actor }}" },
                        { "title": "Lint Job",         "value": "${LINT_STATUS}" },
                        { "title": "Build & Test Job", "value": "${BUILD_STATUS}" }
                      ]
                    },
                    {
                      "type": "ColumnSet",
                      "columns": [
                        {
                          "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "Total Tests", "weight": "Bolder" },
                            { "type": "TextBlock", "text": "${TOTAL}", "size": "ExtraLarge", "weight": "Bolder", "spacing": "None" }
                          ]
                        },
                        {
                          "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "✅ Passed", "weight": "Bolder", "color": "Good" },
                            { "type": "TextBlock", "text": "${PASSED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Good", "spacing": "None" }
                          ]
                        },
                        {
                          "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "❌ Failed", "weight": "Bolder", "color": "Attention" },
                            { "type": "TextBlock", "text": "${FAILED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Attention", "spacing": "None" }
                          ]
                        },
                        {
                          "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "⏭️ Skipped", "weight": "Bolder", "color": "Warning" },
                            { "type": "TextBlock", "text": "${SKIPPED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Warning", "spacing": "None" }
                          ]
                        }
                      ]
                    }
                    ${UI_FAILURES_BLOCK}
                    ${API_FAILURES_BLOCK}
                    ${MOBILE_FAILURES_BLOCK}
                    ${PERF_FAILURES_BLOCK}
                    ${DATA_FAILURES_BLOCK}
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Run",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              }
            ]
          }
          EOF
          )

          curl --retry 3 --retry-delay 5 -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.TEAMS_WEBHOOK_URL }}"
