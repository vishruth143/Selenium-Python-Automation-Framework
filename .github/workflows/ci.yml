# .github/workflows/ci.yml
name: CI - Docker Build and Test

# Triggers: on push to relevant paths/branches, pull requests to main, and daily schedule
on:
  push:
    paths:
      - '.github/**'
      - 'config/**'
      - 'framework/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
    branches:
      - '**'

  pull_request:
    branches:
      - main

  schedule:
    - cron: '30 3 * * *'  # Runs at 09:00 AM IST every day

# Lint job: checks code quality using pylint and enforces a perfect score
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3 # Fetches code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.3' # Uses Python 3.13.3

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run Pylint on tests and Enforce 10/10 Score
        run: |
          echo "Linting tests directory..."
          SCORE=$(pylint tests | tee pylint-output.txt | tail -n 2 | grep "rated at" | awk '{print $7}' | cut -d'/' -f1)
          echo "Pylint Score: $SCORE"
          if [ "$(echo "$SCORE < 10.0" | bc)" -eq 1 ]; then
            echo "❌ Pylint score is less than 10.0. Failing the build."
            exit 1
          fi

  # Build and test job: runs after lint, executes tests, generates reports
  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      total:   ${{ steps.test_results.outputs.total }}
      passed:  ${{ steps.test_results.outputs.passed }}
      failed:  ${{ steps.test_results.outputs.failed }}
      skipped: ${{ steps.test_results.outputs.skipped }}

    env:
      REGION: qa
      BROWSER: CHROME
      HEADLESS: Y

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7' # Uses Python 3.13.7

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Ensure output directories exist
        run: |
          mkdir -p output/allure-results
          mkdir -p output/screenshots
          mkdir -p output/logs
          mkdir -p output/reports
          mkdir -p output/videos

      - name: Run Pytest with HTML and Allure Reporting
        run: |
          pytest -vvv -m "pta or heroku or jsonplaceholder" \
            -n 4 \
            --html=output/reports/pta_report.html \
            --self-contained-html \
            --capture=tee-sys \
            --alluredir=output/allure-results \
            --durations=10 \
            --junit-xml=output/reports/junit_report.xml \
            tests

      - name: Parse Test Results
        if: always()
        id: test_results
        run: |
          if [ -f output/reports/junit_report.xml ]; then
            TOTAL=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('output/reports/junit_report.xml')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          total   = int(suite.get('tests', 0))
          errors  = int(suite.get('errors', 0))
          failures= int(suite.get('failures', 0))
          skipped = int(suite.get('skipped', 0))
          passed  = total - failures - errors - skipped
          print(f'{total},{passed},{failures + errors},{skipped}')
          ")
            IFS=',' read -r TOTAL PASSED FAILED SKIPPED <<< "$TOTAL"
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          fi
          echo "total=$TOTAL"     >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED"   >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"   >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "Test Results → Total: $TOTAL | Passed: $PASSED | Failed: $FAILED | Skipped: $SKIPPED"

      - name: Install Allure CLI (Manual)
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure Report HTML
        run: |
          allure generate output/allure-results --clean -o allure-report

      - name: Upload Allure HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload HTML Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: output/reports

      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: output/logs

      - name: Upload Screenshots as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots

      - name: Upload Videos as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: output/videos

  # Notification job: sends CI status to Microsoft Teams via webhook
  notify-teams:
    name: Notify Teams
    needs: [ lint, build-and-test ]
    runs-on: ubuntu-latest
    if: always()  # Always run this job

    steps:
      - name: Send Notification to Microsoft Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          LINT_STATUS: ${{ needs.lint.result }}
          BUILD_STATUS: ${{ needs.build-and-test.result }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          TOTAL_TESTS: ${{ needs.build-and-test.outputs.total }}
          PASSED_TESTS: ${{ needs.build-and-test.outputs.passed }}
          FAILED_TESTS: ${{ needs.build-and-test.outputs.failed }}
          SKIPPED_TESTS: ${{ needs.build-and-test.outputs.skipped }}
        run: |
          echo "Lint Job Status: $LINT_STATUS"
          echo "Build and Test Job Status: $BUILD_STATUS"

          OVERALL_STATUS="success"
          STATUS_EMOJI="✅"
          COLOR="00FF00"

          if [ "$LINT_STATUS" != "success" ] || [ "$BUILD_STATUS" != "success" ]; then
            OVERALL_STATUS="failure"
            STATUS_EMOJI="❌"
            COLOR="FF0000"
          fi

          MESSAGE=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "$COLOR",
            "summary": "Automation CI Status",
            "sections": [ {
              "activityTitle": "$STATUS_EMOJI Selenium CI Pipeline Report",
              "facts": [
                { "name": "Trigger", "value": "$GITHUB_EVENT_NAME" },
                { "name": "Triggered By", "value": "$GITHUB_ACTOR" },
                { "name": "Lint Job", "value": "$LINT_STATUS" },
                { "name": "Build & Test Job", "value": "$BUILD_STATUS" },
                { "name": "Total Tests", "value": "$TOTAL_TESTS" },
                { "name": "✅ Passed", "value": "$PASSED_TESTS" },
                { "name": "❌ Failed", "value": "$FAILED_TESTS" },
                { "name": "⏭️ Skipped", "value": "$SKIPPED_TESTS" },
                { "name": "Branch", "value": "$GITHUB_REF_NAME" },
                { "name": "Run", "value": "[View Run]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" }                
              ],
              "markdown": true
            } ]
          }
          EOF
          )

          curl --retry 3 --retry-delay 5 -H "Content-Type: application/json" -d "$MESSAGE" "$TEAMS_WEBHOOK_URL"
