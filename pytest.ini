[pytest]
markers =
    pta                         : UI tests for 'PTA' website
    hirokuapp                   : UI tests for 'The Internet Herokuapp' website
    kwa                         : UI tests for 'KWA' app
    reqres                      : API tests for 'Reqres'
    commerce_tools              : API tests for 'Commerce Tools`
    excel                       : Read/Write data from/to an 'Excel file'
    param                       : Parametrized tests
    retry                       : Tests with retry logic